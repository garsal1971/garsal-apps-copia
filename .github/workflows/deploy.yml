name: Deploy claude branch → master

on:
  push:
    branches:
      - 'master'
      - 'claude/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge branch into master and push
        run: |
          BRANCH="${{ github.ref_name }}"
          git checkout master
          git merge "origin/$BRANCH" --no-ff -m "deploy: $BRANCH → master [$(date -u '+%Y-%m-%dT%H:%M:%SZ')]"

          # Rimuove i vecchi workflow PR/merge se ancora presenti
          CHANGED=0
          for F in .github/workflows/auto-pr-claude.yml .github/workflows/auto-merge-claude.yml; do
            if [ -f "$F" ]; then
              git rm "$F"
              CHANGED=1
            fi
          done
          if [ "$CHANGED" = "1" ]; then
            git commit -m "chore: rimuove vecchi workflow auto-pr e auto-merge"
          fi

          git push origin master

      - name: Check what changed
        id: check_changes
        run: |
          FILES=$(git diff HEAD~1 HEAD --name-only)
          if echo "$FILES" | grep -q '^supabase/functions/'; then
            echo "functions=true" >> $GITHUB_OUTPUT
          else
            echo "functions=false" >> $GITHUB_OUTPUT
          fi
          if echo "$FILES" | grep -q '^supabase/migrations/'; then
            echo "migrations=true" >> $GITHUB_OUTPUT
          else
            echo "migrations=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Supabase CLI
        if: steps.check_changes.outputs.functions == 'true' || steps.check_changes.outputs.migrations == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply Supabase migrations
        if: steps.check_changes.outputs.migrations == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "▶ Applying database migrations..."
          supabase db push --project-ref jajlmmdsjlvzgcxiiypk

      - name: Deploy Supabase Edge Functions
        if: steps.check_changes.outputs.functions == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for FN in $(git diff HEAD~1 HEAD --name-only | grep '^supabase/functions/' | awk -F/ '{print $3}' | sort -u); do
            echo "▶ Deploy edge function: $FN"
            EXTRA=""
            if grep -q "verify_jwt = false" "supabase/functions/$FN/config.toml" 2>/dev/null; then
              EXTRA="--no-verify-jwt"
              echo "   ↳ verify_jwt=false → aggiunto --no-verify-jwt"
            fi
            supabase functions deploy "$FN" --project-ref jajlmmdsjlvzgcxiiypk $EXTRA
          done
