name: Deploy claude branch → master

on:
  push:
    branches:
      - 'claude/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge branch into master and push
        run: |
          BRANCH="${{ github.ref_name }}"
          git checkout master
          git merge "origin/$BRANCH" --no-ff -m "deploy: $BRANCH → master [$(date -u '+%Y-%m-%dT%H:%M:%SZ')]"

          # Rimuove i vecchi workflow PR/merge se ancora presenti
          CHANGED=0
          for F in .github/workflows/auto-pr-claude.yml .github/workflows/auto-merge-claude.yml; do
            if [ -f "$F" ]; then
              git rm "$F"
              CHANGED=1
            fi
          done
          if [ "$CHANGED" = "1" ]; then
            git commit -m "chore: rimuove vecchi workflow auto-pr e auto-merge"
          fi

          git push origin master

      - name: Check functions changed
        id: check_fn
        run: |
          CHANGED=$(git diff HEAD~1 HEAD --name-only | grep '^supabase/functions/' || true)
          if [ -n "$CHANGED" ]; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Supabase CLI
        if: steps.check_fn.outputs.deploy == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Supabase Edge Functions
        if: steps.check_fn.outputs.deploy == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for FN in $(git diff HEAD~1 HEAD --name-only | grep '^supabase/functions/' | awk -F/ '{print $3}' | sort -u); do
            echo "▶ Deploy edge function: $FN"
            supabase functions deploy "$FN" --project-ref jajlmmdsjlvzgcxiiypk
          done
